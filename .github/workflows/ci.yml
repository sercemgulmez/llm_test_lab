name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest-cov

      - name: Static syntax check
        run: python -m compileall app.py main.py config.py models.py generators parsers reporters

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy generators/ parsers/ reporters/ security/ runner.py config.py models.py --ignore-missing-imports

      - name: Run test suite with coverage
        run: pytest --cov=. --cov-report=term-missing -q
