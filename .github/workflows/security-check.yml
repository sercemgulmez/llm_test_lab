name: Secret Scan

on:
  push:
  pull_request:

jobs:
  scan:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run secret scanner
        run: python scripts/scan_secrets.py
