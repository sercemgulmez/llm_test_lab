[pytest]
testpaths = tests
pythonpath = .
addopts = -p no:cacheprovider
norecursedirs =
    .git
    .venv
    venv
    env
    __pycache__
    outputs
    uploads
    test_tmp
    pytest_work
    pytest_cache_local
    tmpcase-*
    pytest-cache-files-*
    .pytest_cache
    .pytest_tmp
    .pytest_local
